name: Django CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches:
      - main

jobs:
  validate-project:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: 
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.41.0
        ports:
          - "7700:7700"
        env:
          MEILI_MASTER_KEY: "meilimasterkey"
          MEILI_NO_ANALYTICS: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          set +e
          report=$(python -m pip install --no-cache-dir poetry 2>&1 && poetry install 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error installing dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Check code formatting
        run: |
          set +e
          report=$(poetry run black --check . 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error checking code formatting" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Check code vulnerabilities
        run: |
          set +e
          report=$(poetry run bandit -c pyproject.toml -r . 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error checking code vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Run Tests
        env:
          SECRET_KEY: "fakesecretkey"
          DEBUG: False
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
          FRONTEND_BASE_URL: "http://localhost:3000"
          EMAIL_HOST: ""
          EMAIL_PORT: ""
          EMAIL_HOST_USER: ""
          EMAIL_HOST_PASSWORD: ""
          MEILI_URL: "http://localhost:7700"
          MEILI_MASTER_KEY: "meilimasterkey"
        run: |
          set +e
          report=$(poetry run python manage.py test | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $? -ne 0 ]; then
            echo "## ❌ Error installing dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

  build-image:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    needs: validate-project
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Install pipeline dependencies
        run: pip install --no-cache-dir toml-cli

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version and generate tags
        id: get-version-and-gen-tags
        run: |
          version=$(toml get project.version --toml-path pyproject.toml)
          D='0|[1-9][0-9]*'
          if [[ ! $version =~ ^($D)\.($D)\.($D)$ ]]; then
            echo "## ❌ Error validating project version" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "Invalid version: $version" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="$major.${BASH_REMATCH[2]}"
          patch="$major.$minor.${BASH_REMATCH[3]}"

          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"
          echo "patch=$patch" >> "$GITHUB_OUTPUT"

      - name: Generate release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: ncipollo/release-action@v1
        with:
          name: ${{ steps.get-version-and-gen-tags.outputs.patch }}

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for tests
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ github.repository_owner }}/getsongsweb-api:latest
            ${{ github.repository_owner }}/getsongsweb-api:${{ steps.get-version-and-gen-tags.outputs.patch }}
            ${{ github.repository_owner }}/getsongsweb-api:${{ steps.get-version-and-gen-tags.outputs.minor }}
            ${{ github.repository_owner }}/getsongsweb-api:${{ steps.get-version-and-gen-tags.outputs.major }}

  deploy-railway:
    runs-on: ubuntu-latest
    needs: build-image
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Install Railway
        run: bash <(curl -fsSL cli.new)

      - name: Deploy
        run: railway up --service API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
