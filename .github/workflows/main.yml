name: Django CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches:
      - main

jobs:
  validate-project:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: 
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.41.0
        ports:
          - "7700:7700"
        env:
          MEILI_MASTER_KEY: "meilimasterkey"
          MEILI_NO_ANALYTICS: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          set +e
          report=$(python -m pip install --no-cache-dir poetry 2>&1 && poetry install 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error installing dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Check code formatting
        run: |
          set +e
          report=$(poetry run ruff format --check . 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error checking code formatting" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Lint code
        run: |
          set +e
          report=$(poetry run ruff check . 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error linting code" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Check code vulnerabilities
        run: |
          set +e
          report=$(poetry run bandit -c pyproject.toml -r . 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error checking code vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Run Tests
        env:
          SECRET_KEY: "fakesecretkey"
          DEBUG: False
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
          FRONTEND_BASE_URL: "http://localhost:3000"
          EMAIL_HOST: ""
          EMAIL_PORT: ""
          EMAIL_HOST_USER: ""
          EMAIL_HOST_PASSWORD: ""
          MEILI_URL: "http://localhost:7700"
          MEILI_MASTER_KEY: "meilimasterkey"
        run: |
          set +e
          report=$(poetry run pytest | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $? -ne 0 ]; then
            echo "## ❌ Error installing dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0

  build-image:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    needs: validate-project
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main')
    steps:
      - name: Install pipeline dependencies
        run: pip install --no-cache-dir toml-cli

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine build type
        id: build-type
        run: |
          stable=false
          [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]] && stable=true
          echo "stable=$stable" >> "$GITHUB_OUTPUT"

      - name: Get version and validate format
        id: version
        run: |
          set -euo pipefail
          version=$(toml get project.version --toml-path pyproject.toml)
          stable="${{ steps.build-type.outputs.stable }}"
          D='0|[1-9][0-9]*'

          fail_version() {
            echo "## ❌ Error validating project version" >> $GITHUB_STEP_SUMMARY
            printf '```\n%s\n```\n' "$1" >> $GITHUB_STEP_SUMMARY
            exit 1
          }

          if [[ "$stable" == "true" ]]; then
            [[ $version =~ ^($D)\.($D)\.($D)$ ]] \
              || fail_version "Stable builds require X.Y.Z format. Got: $version"
            echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "minor=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            [[ $version =~ ^($D)\.($D)\.($D)-[a-zA-Z][a-zA-Z0-9]*$ ]] \
              || fail_version "Pre-release builds require X.Y.Z-<suffix> format (e.g. 1.0.4-rc1). Got: $version"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        if: steps.build-type.outputs.stable == 'true'
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          ! git tag | grep -q "^${version}$" || {
            echo "## ❌ Error validating project version" >> $GITHUB_STEP_SUMMARY
            printf '```\nTag %s already exists!\n```\n' "$version" >> $GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Generate release
        if: steps.build-type.outputs.stable == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set container image url
        id: image-url
        run: echo "url=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          url="${{ steps.image-url.outputs.url }}"
          version="${{ steps.version.outputs.version }}"

          if [[ "${{ steps.build-type.outputs.stable }}" != "true" ]]; then
            echo "tags=$url:$version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "tags<<EOF"
            echo "$url:latest"
            echo "$url:${{ steps.version.outputs.major }}"
            echo "$url:${{ steps.version.outputs.minor }}"
            echo "$url:$version"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

    outputs:
      image-tag: ${{ steps.image-url.outputs.url }}:${{ steps.version.outputs.version }}
      stable: ${{ steps.build-type.outputs.stable }}

  deploy-railway:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-image.outputs.stable == 'true'
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - run: railway up --service=API

  deploy-azure:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-image.outputs.stable == 'true'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: getsongsweb
          containerAppName: getsongsweb-api
          imageToDeploy: ${{ needs.build-image.outputs.image-tag }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_TOKEN }}

