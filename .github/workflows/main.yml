name: Django CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches:
      - main

jobs:
  validate-project:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: 
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.41.0
        ports:
          - "7700:7700"
        env:
          MEILI_MASTER_KEY: "meilimasterkey"
          MEILI_NO_ANALYTICS: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          set +e
          report=$(python -m pip install --no-cache-dir poetry 2>&1 && poetry install 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error installing dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Check code formatting
        run: |
          set +e
          report=$(poetry run black --check . 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error checking code formatting" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Check code vulnerabilities
        run: |
          set +e
          report=$(poetry run bandit -c pyproject.toml -r . 2>&1 | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error checking code vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Run Tests
        env:
          SECRET_KEY: "fakesecretkey"
          DEBUG: False
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
          FRONTEND_BASE_URL: "http://localhost:3000"
          EMAIL_HOST: ""
          EMAIL_PORT: ""
          EMAIL_HOST_USER: ""
          EMAIL_HOST_PASSWORD: ""
          MEILI_URL: "http://localhost:7700"
          MEILI_MASTER_KEY: "meilimasterkey"
        run: |
          set +e
          report=$(poetry run python manage.py test | tee /dev/stderr)
          exit_code=$?
          set -e

          if [ $? -ne 0 ]; then
            echo "## ❌ Error installing dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0

  build-image:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    needs: validate-project
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Install pipeline dependencies
        run: pip install --no-cache-dir toml-cli

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version and generate tags
        id: version
        run: |
          version=$(toml get project.version --toml-path pyproject.toml)
          D='0|[1-9][0-9]*'
          if [[ ! $version =~ ^($D)\.($D)\.($D)$ ]]; then
            echo "## ❌ Error validating project version" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "Invalid version: $version" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="$major.${BASH_REMATCH[2]}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        run: |
          if git tag | grep -q "^${{ steps.version.outputs.version }}$"; then
            message="Tag ${{ steps.version.outputs.version }} already exists!"
            echo "$message"
            echo "## ❌ Error validating project version" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$message" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Generate release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set container image url
        id: image-url
        run: echo "url=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image-url.outputs.url }}:latest
            ${{ steps.image-url.outputs.url }}:${{ steps.version.outputs.major }}
            ${{ steps.image-url.outputs.url }}:${{ steps.version.outputs.minor }}
            ${{ steps.image-url.outputs.url }}:${{ steps.version.outputs.version }}
    outputs:
      image-tag: ${{ steps.image-url.outputs.url }}:${{ steps.version.outputs.version }}

  deploy-railway:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Install Railway
        run: bash <(curl -fsSL cli.new)

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy
        run: railway up --service API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-azure:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: getsongsweb
          containerAppName: getsongsweb-api
          imageToDeploy: ${{ jobs.build-image.outputs.image-tag }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}

