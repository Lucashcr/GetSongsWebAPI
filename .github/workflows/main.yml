name: Django CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches:
      - main

jobs:
  validate-project:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: 
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.41.0
        ports:
          - "7700:7700"
        env:
          MEILI_MASTER_KEY: "meilimasterkey"
          MEILI_NO_ANALYTICS: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          report=$(python -m pip install --no-cache-dir poetry && poetry install 2>&1) || true
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error installing dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Check code formatting
        run: |
          poetry run black --check .
          report=$(poetry run black --check .) || true
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error checking code formatting" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Check code vulnerabilities
        run: |
          report=$(poetry run bandit -r .) || true
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            echo "## ❌ Error checking code vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

      - name: Run Tests
        env:
          SECRET_KEY: "fakesecretkey"
          DEBUG: False
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
          FRONTEND_BASE_URL: "http://localhost:3000"
          EMAIL_HOST: ""
          EMAIL_PORT: ""
          EMAIL_HOST_USER: ""
          EMAIL_HOST_PASSWORD: ""
          MEILI_URL: "http://localhost:7700"
          MEILI_MASTER_KEY: "meilimasterkey"
        run: |
          report=$(poetry run python manage.py test) || true
          exit_code=$?

          if [ $? -ne 0 ]; then
            echo "## ❌ Error installing dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi

  # build-image:
  #   runs-on: ubuntu-latest
  #   needs: validate
  #   if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
  #   steps:

  deploy-railway:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Install Railway
        run: bash <(curl -fsSL cli.new)

      - uses: actions/checkout@v6

      - name: Deploy
        run: railway up --service API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
